    <script type="module">
      // #region agent log

        sessionId: '76b3b7',
        log(location, message, data, hypothesisId) {
          const payload = { sessionId: this.sessionId, location, message, data: data || {}, timestamp: Date.now(), hypothesisId };
          fetch(this.endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': this.sessionId }, body: JSON.stringify(payload) }).catch(() => {});

        try {

          DEBUG.log('locator.html:beforeConfigure', 'Before configureFromQuickBuilder', { hasLocator: !!locator }, 'C');

          console.error(err);
